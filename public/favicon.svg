<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="#5b5ef4"/>
  <!-- Ticket body: main rectangle -->
  <rect x="5" y="10" width="22" height="14" rx="2.5" fill="white" opacity="0.15"/>
  <rect x="5" y="10" width="22" height="14" rx="2.5" stroke="white" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Ticket notch left -->
  <circle cx="5" cy="17" r="2.5" fill="#5b5ef4"/>
  <!-- Ticket notch right -->
  <circle cx="27" cy="17" r="2.5" fill="#5b5ef4"/>
  <!-- Dashed center line (perforation) -->
  <line x1="11" y1="17" x2="21" y2="17" stroke="white" stroke-width="1" stroke-dasharray="2 1.5" opacity="0.6"/>
  <!-- Top text lines (stub side) -->
  <rect x="8" y="13" width="6" height="1.5" rx="0.75" fill="white" opacity="0.9"/>
  <rect x="8" y="15.5" width="4" height="1.5" rx="0.75" fill="white" opacity="0.5"/>
  <!-- Main side lines -->
  <rect x="16.5" y="13" width="7.5" height="1.5" rx="0.75" fill="white" opacity="0.9"/>
  <rect x="16.5" y="15.5" width="5" height="1.5" rx="0.75" fill="white" opacity="0.5"/>
</svg>
